name: Regenerate vocabulary content

# Manually-triggered job that regenerates the AI meanings and/or example
# sentences for the vocabulary, running on GitHub's servers (which can reach
# Supabase + Groq). Trigger from the Actions tab → "Run workflow".

on:
  workflow_dispatch:
    inputs:
      task:
        description: What to regenerate
        type: choice
        default: both
        options: [meanings, examples, examples-fill, both, comprehension, comprehension-prune, clean-meanings, deactivate-awkward, seed-hsk2, audio-hsk2, stories-hsk2, seed-n4, audio-n4, stories-n4, seed-russian, audio-russian, examples-russian, stories-russian, stories-hsk1-replace, stories-hsk2-replace]
      language:
        description: Which language
        type: choice
        default: both
        options: [both, japanese, chinese]

permissions:
  contents: read

# Don't run two regenerations at once (they'd fight over the same rows).
concurrency:
  group: regen-content
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # 22 has a global WebSocket, which supabase-js needs
          cache: npm
      - run: npm ci
      - name: Regenerate
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # LLM provider: llm.mjs prefers GEMINI_API_KEY (Gemini Flash), falls back
          # to GROQ_API_KEY. Optionally override LLM_MODEL / LLM_BASE_URL.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          GOOGLE_TTS_KEY: ${{ secrets.VITE_GOOGLE_TTS_KEY }}
        run: |
          set -e
          LANG_FLAG=""
          case "${{ inputs.language }}" in
            japanese) LANG_FLAG="--japanese" ;;
            chinese)  LANG_FLAG="--chinese" ;;
          esac

          if [ "${{ inputs.task }}" = "meanings" ] || [ "${{ inputs.task }}" = "both" ]; then
            echo "::group::Meanings"
            node generate-meanings.mjs $LANG_FLAG
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "examples" ] || [ "${{ inputs.task }}" = "both" ]; then
            echo "::group::Example sentences (regenerate ALL)"
            node generate-examples.mjs $LANG_FLAG --regen
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "examples-fill" ]; then
            echo "::group::Example sentences (fill only missing — safe for new levels)"
            node generate-examples.mjs $LANG_FLAG
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "comprehension" ]; then
            echo "::group::Story comprehension questions"
            node generate-comprehension.mjs $LANG_FLAG
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "comprehension-prune" ]; then
            echo "::group::Prune trivial comprehension questions, then regenerate them"
            node generate-comprehension.mjs --prune
            node generate-comprehension.mjs $LANG_FLAG
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "clean-meanings" ]; then
            echo "::group::Clean meanings (deterministic)"
            node clean-meanings.mjs $LANG_FLAG --apply
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "deactivate-awkward" ]; then
            echo "::group::Deactivate awkward vocab (counter-suffixes + duplicate readings)"
            node deactivate-awkward-vocab.mjs --apply
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "seed-hsk2" ]; then
            echo "::group::Seed HSK 3.0 level 2 vocabulary from data/hsk2.json"
            node seed-vocab.mjs --file data/hsk2.json --language chinese --system hsk_3 --level 2 --apply
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "audio-hsk2" ]; then
            echo "::group::Generate HSK 3.0 level 2 audio (Google TTS)"
            node generate-audio.mjs --language chinese --system hsk_3 --level 2
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "stories-hsk2" ]; then
            echo "::group::Generate HSK 3.0 level 2 stories"
            node generate-stories.mjs --language chinese --system hsk_3 --level 2
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "stories-hsk1-replace" ]; then
            echo "::group::REPLACE HSK 1 stories (deletes existing, regenerates longer story-first versions)"
            node generate-stories.mjs --language chinese --system hsk_3 --level 1 --replace
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "stories-hsk2-replace" ]; then
            echo "::group::REPLACE HSK 2 stories (deletes existing, regenerates longer story-first versions)"
            node generate-stories.mjs --language chinese --system hsk_3 --level 2 --replace
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "seed-n4" ]; then
            echo "::group::Seed JLPT N4 (japanese level 3) vocabulary from data/n4.json"
            node seed-vocab.mjs --file data/n4.json --language japanese --system jlpt --level 3 --apply
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "audio-n4" ]; then
            echo "::group::Generate JLPT N4 audio (Google TTS)"
            node generate-audio.mjs --language japanese --system jlpt --level 3
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "stories-n4" ]; then
            echo "::group::Generate JLPT N4 stories"
            node generate-stories.mjs --language japanese --system jlpt --level 3
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "seed-russian" ]; then
            echo "::group::Seed Russian CEFR A1 (russian level 1) vocabulary from data/russian-a1.json"
            node seed-vocab.mjs --file data/russian-a1.json --language russian --system russian --level 1 --apply
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "audio-russian" ]; then
            echo "::group::Generate Russian A1 audio (Google TTS, ru-RU)"
            node generate-audio.mjs --language russian --system russian --level 1
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "examples-russian" ]; then
            echo "::group::Russian example sentences (fill only missing — safe for new level)"
            node generate-examples.mjs --russian
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "stories-russian" ]; then
            echo "::group::Generate Russian A1 stories"
            node generate-stories.mjs --language russian --system russian --level 1
            echo "::endgroup::"
          fi

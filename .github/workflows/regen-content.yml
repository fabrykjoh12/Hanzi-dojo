name: Regenerate vocabulary content

# Manually-triggered job that regenerates the AI meanings and/or example
# sentences for the vocabulary, running on GitHub's servers (which can reach
# Supabase + Groq). Trigger from the Actions tab → "Run workflow".

on:
  workflow_dispatch:
    inputs:
      task:
        description: What to regenerate
        type: choice
        default: both
        options: [meanings, examples, examples-fill, both, comprehension, clean-meanings, deactivate-awkward, seed-hsk2, audio-hsk2, stories-hsk2]
      language:
        description: Which language
        type: choice
        default: both
        options: [both, japanese, chinese]

permissions:
  contents: read

# Don't run two regenerations at once (they'd fight over the same rows).
concurrency:
  group: regen-content
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # 22 has a global WebSocket, which supabase-js needs
          cache: npm
      - run: npm ci
      - name: Regenerate
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_TTS_KEY: ${{ secrets.VITE_GOOGLE_TTS_KEY }}
        run: |
          set -e
          LANG_FLAG=""
          case "${{ inputs.language }}" in
            japanese) LANG_FLAG="--japanese" ;;
            chinese)  LANG_FLAG="--chinese" ;;
          esac

          if [ "${{ inputs.task }}" = "meanings" ] || [ "${{ inputs.task }}" = "both" ]; then
            echo "::group::Meanings"
            node generate-meanings.mjs $LANG_FLAG
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "examples" ] || [ "${{ inputs.task }}" = "both" ]; then
            echo "::group::Example sentences (regenerate ALL)"
            node generate-examples.mjs $LANG_FLAG --regen
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "examples-fill" ]; then
            echo "::group::Example sentences (fill only missing — safe for new levels)"
            node generate-examples.mjs $LANG_FLAG
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "comprehension" ]; then
            echo "::group::Story comprehension questions"
            node generate-comprehension.mjs $LANG_FLAG
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "clean-meanings" ]; then
            echo "::group::Clean meanings (deterministic)"
            node clean-meanings.mjs $LANG_FLAG --apply
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "deactivate-awkward" ]; then
            echo "::group::Deactivate awkward vocab (counter-suffixes + duplicate readings)"
            node deactivate-awkward-vocab.mjs --apply
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "seed-hsk2" ]; then
            echo "::group::Seed HSK 3.0 level 2 vocabulary from data/hsk2.json"
            node seed-vocab.mjs --file data/hsk2.json --language chinese --system hsk_3 --level 2 --apply
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "audio-hsk2" ]; then
            echo "::group::Generate HSK 3.0 level 2 audio (Google TTS)"
            node generate-audio.mjs --language chinese --system hsk_3 --level 2
            echo "::endgroup::"
          fi

          if [ "${{ inputs.task }}" = "stories-hsk2" ]; then
            echo "::group::Generate HSK 3.0 level 2 stories"
            node generate-stories.mjs --language chinese --system hsk_3 --level 2
            echo "::endgroup::"
          fi

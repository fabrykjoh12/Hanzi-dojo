<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- %BASE_URL% is replaced by Vite per host: /Hanzi-dojo/ on GitHub Pages, / on Vercel.
         Using it keeps every asset path correct on both (and fixes the favicon 404 on the subpath). -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <meta name="theme-color" content="#B83A24" />

    <!-- Fonts: preconnect + direct link (not a CSS @import, which would
         serialize behind the app stylesheet and delay first text paint). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" />

    <title>Hanzi Dojo — Learn Chinese, Japanese &amp; Russian free</title>
    <meta name="description" content="Learn Chinese, Japanese, and Russian with SRS flashcards and level-matched immersion reading and listening. Free forever, no credit card." />

    <!-- Social share preview. og:image must be an ABSOLUTE URL — scrapers
         (Twitter, Discord, iMessage) don't resolve relative paths. The GitHub
         Pages copy works as the image host for shares of either deployment. -->
    <meta property="og:title" content="Hanzi Dojo" />
    <meta property="og:description" content="Learn Chinese, Japanese, and Russian with SRS flashcards and level-matched immersion. Free forever." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://fabrykjoh12.github.io/Hanzi-dojo/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Hanzi Dojo" />
    <meta name="twitter:description" content="Learn Chinese, Japanese, and Russian with SRS flashcards and immersion. Free forever." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
